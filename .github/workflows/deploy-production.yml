name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zamerflow-production-deploy
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/zamerflow_deploy_key
          chmod 600 ~/.ssh/zamerflow_deploy_key
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Run production deploy script
        run: |
          ssh \
            -i ~/.ssh/zamerflow_deploy_key \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sudo /usr/local/sbin/zamerflow-deploy.sh"
